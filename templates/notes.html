<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>All Notes — Notes Circle</title>
<link rel="stylesheet" href="../static/css/style.css" />
</head>
<body>

  <nav class="top-nav">
    <a href="/" class="brand">Notes Circle</a>
    <div class="nav-right">
      <a href="/notes" class="nav-link">All Notes</a>
      <a href="/member-form" class="nav-link">Contact Details</a>
      <a href="/login" id="signInLink" class="nav-link secondary">Sign In</a>
      <span id="welcomeText" style="display:none;"></span>
      <button type="button" id="logoutBtn" class="nav-link secondary" style="display:none;">Log Out</button>
    </div>
  </nav>

  <div class="page">
    <div class="notes-header">
      <h1>
        All Notes
        <span class="badge" id="noteCount">…</span>
      </h1>
      <button type="button" class="btn btn-primary" id="refreshBtn">↻ Refresh</button>
    </div>

    <div class="notes-grid" id="notesGrid">
      <div class="loading-state">Loading notes…</div>
    </div>
  </div>

  <script src="../static/js/script.js"></script>

</body>
</html>
